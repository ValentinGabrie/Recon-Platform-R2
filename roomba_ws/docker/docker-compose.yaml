# PostgreSQL database for the roomba project.
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f postgres
# Reset:  docker compose down -v  (DESTROYS ALL DATA)

services:
  postgres:
    image: postgres:16-alpine
    container_name: roomba_postgres
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - roomba_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  roomba_pgdata:
