{% extends "base.html" %}
{% block title %}Bluetooth{% endblock %}

{% block content %}
<h1>Bluetooth Management</h1>

<!-- Current Status -->
<div class="card" style="margin-bottom:1rem;">
    <div class="card-title">Current Controller Status</div>
    <div id="btStatus" style="line-height:1.8;">Loading&hellip;</div>
</div>

<div class="card-grid">
    <!-- Paired / Known Devices -->
    <div class="card">
        <div class="card-title">Known Devices</div>
        <ul class="device-list" id="deviceList">
            <li>Loading&hellip;</li>
        </ul>
    </div>

    <!-- Scan + Setup -->
    <div class="card">
        <div class="card-title">Add New Controller</div>
        <p style="color:#8b949e;margin:0 0 .75rem;">Press the Xbox button on the controller, then scan.</p>
        <div style="margin-bottom:.75rem;">
            <button class="btn btn-primary btn-sm" id="scanBtn" onclick="startScan()">
                Scan for Devices (10s)
            </button>
        </div>
        <div class="scan-status" id="scanStatus"></div>
        <ul class="device-list" id="scanResults"></ul>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // --- Bluetooth Status (via WebSocket) ---
    socket.on('bluetooth_status', (d) => {
        const el = document.getElementById('btStatus');
        const isMock = d.name === 'No device (mock)';

        let badge;
        if (isMock) {
            badge = '<span class="badge badge-mock">MOCK</span>';
        } else if (d.connected) {
            badge = '<span class="badge badge-connected">CONNECTED</span>';
        } else {
            badge = '<span class="badge badge-mock">DISCONNECTED</span>';
        }

        let stateFlags = '';
        if (!isMock) {
            stateFlags =
                '<div><strong>Paired:</strong> ' + (d.paired ? 'Yes' : 'No') +
                ' &ensp; <strong>Trusted:</strong> ' + (d.trusted ? 'Yes' : 'No') + '</div>';
        }

        el.innerHTML =
            '<div><strong>Device:</strong> ' + esc(d.name) + ' ' + badge + '</div>' +
            '<div><strong>MAC:</strong> <code>' + esc(d.mac) + '</code></div>' +
            stateFlags +
            '<div><strong>Battery:</strong> ' + (d.battery_pct !== null ? d.battery_pct + '%' : 'N/A') + '</div>';
    });

    // --- Known Devices ---
    async function refreshDevices() {
        try {
            const res = await fetch('/api/bluetooth/devices');
            const devices = await res.json();
            const list = document.getElementById('deviceList');

            if (devices.length === 0) {
                list.innerHTML = '<li style="color:#484f58">No devices paired yet &mdash; scan to add one</li>';
                return;
            }

            list.innerHTML = devices.map(d => `
                <li>
                    <div class="device-info">
                        <span class="device-name">${esc(d.name)}</span>
                        <span class="device-mac">${esc(d.mac)}</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-sm btn-primary" onclick="btAction('/api/bluetooth/connect', '${esc(d.mac)}', 'Connecting', 20000)">Connect</button>
                        <button class="btn btn-sm btn-danger" onclick="btAction('/api/bluetooth/disconnect', '${esc(d.mac)}', 'Disconnecting')">Disconnect</button>
                        <button class="btn btn-sm" onclick="btAction('/api/bluetooth/remove', '${esc(d.mac)}', 'Removing')">Remove</button>
                    </div>
                </li>
            `).join('');
        } catch (e) {
            console.warn('Failed to refresh devices:', e);
        }
    }

    // --- Scan ---
    async function startScan() {
        const btn = document.getElementById('scanBtn');
        const status = document.getElementById('scanStatus');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Scanning\u2026';
        status.textContent = '';

        try {
            const res = await fetch('/api/bluetooth/scan', { method: 'POST' });
            const devices = await res.json();

            status.textContent = 'Found ' + devices.length + ' device(s)';
            const results = document.getElementById('scanResults');
            if (devices.length === 0) {
                results.innerHTML = '<li style="color:#484f58">No devices found &mdash; make sure the controller is in pairing mode</li>';
            } else {
                results.innerHTML = devices.map(d => `
                    <li>
                        <div class="device-info">
                            <span class="device-name">${esc(d.name)}</span>
                            <span class="device-mac">${esc(d.mac)}</span>
                        </div>
                        <button class="btn btn-sm btn-primary" onclick="btSetup('${esc(d.mac)}')">Setup</button>
                    </li>
                `).join('');
            }
        } catch (e) {
            status.textContent = 'Scan failed';
            console.warn('Scan error:', e);
        }

        btn.disabled = false;
        btn.textContent = 'Scan for Devices (10s)';
    }

    // --- BT Actions ---
    async function btAction(url, mac, verb, waitMs) {
        const t = showToast(verb + '\u2026', true, waitMs || 10000);
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mac })
            });
            dismissToast(t);
            const data = await res.json();
            showToast(data.success ? data.message : (data.message || verb + ' failed'), data.success);
            refreshDevices();
        } catch (e) {
            dismissToast(t);
            showToast(verb + ' failed: ' + e.message, false);
        }
    }

    async function btSetup(mac) {
        const t = showToast('Setting up controller\u2026 pair \u2192 trust \u2192 connect (~30s)', true, 90000);
        try {
            const res = await fetch('/api/bluetooth/setup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mac })
            });
            dismissToast(t);
            const data = await res.json();
            showToast(data.success ? data.message : (data.message || 'Setup failed'), data.success);
            refreshDevices();
        } catch (e) {
            dismissToast(t);
            showToast('Setup failed: ' + e.message, false);
        }
    }

    // Initial load
    refreshDevices();
</script>
{% endblock %}
