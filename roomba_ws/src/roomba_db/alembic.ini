# Alembic configuration for roomba_db
# The DB URL is read from the ROOMBA_DB_URL environment variable in env.py,
# NOT from this file.  The placeholder below is only used as a fallback.

[alembic]
script_location = roomba_db/migrations
prepend_sys_path = .
sqlalchemy.url = sqlite:///roomba.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
